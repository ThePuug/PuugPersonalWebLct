name: Deploy branch preview to Firebase Hosting
'on':
  push:
    branches-ignore:
      - main
jobs:
  build_and_preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci && npm run build
        env:
          DISCORD_TOKEN: '${{ secrets.DISCORD_TOKEN }}'
      # Firebase channel IDs only allow letters, numbers and hyphens
      - id: channel
        run: echo "id=$(echo "$GITHUB_REF_NAME" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g' | cut -c1-30)" >> "$GITHUB_OUTPUT"
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PUUGPERSONALWEBLCT }}'
          channelId: '${{ steps.channel.outputs.id }}'
          projectId: puugpersonalweblct
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels
